name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify consistency before release
        run: python scripts/check_consistency.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/RBraga01/builder-product/blob/master/CHANGELOG.md) for details.

            **Install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/RBraga01/builder-product/${{ github.ref_name }}/install.sh | bash
            ```
