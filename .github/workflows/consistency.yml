name: Version Consistency

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_consistency.py
